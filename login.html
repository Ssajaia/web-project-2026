<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to Wright Fasten to track your typing progress." />
  <title>Log In</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body data-page="login" class="auth-page">

  <div class="auth-card" role="main">

    <div class="auth-card__logo">
      <a href="index.html" class="logo" aria-label="write faster - Home">
        <div class="logo__symbol" aria-hidden="true">
          <img src="./assets/logo.svg" alt="logo">
        </div>
        <div class="logo__wordmark">
          <span class="logo__name">write faster</span>
          <span class="logo__tagline">Speed Test</span>
        </div>
      </a>
    </div>

    <h1 class="auth-card__title page-title">Welcome back</h1>
    <p class="auth-card__subtitle">Log in to track your typing progress</p>

    <div
      id="login-error"
      class="error-message"
      role="alert"
      aria-live="polite"
    ></div>

    <form id="login-form" novalidate aria-label="Log in form">

      <div class="form-group">
        <label class="form-label" for="login-email">Email address</label>
        <input
          type="email"
          id="login-email"
          class="form-input"
          name="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
          aria-required="true"
          aria-describedby="login-email-hint"
        />
        <span id="login-email-hint" class="form-hint"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input
          type="password"
          id="login-password"
          class="form-input"
          name="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
          aria-required="true"
          aria-describedby="login-password-hint"
          minlength="8"
        />
        <span id="login-password-hint" class="form-hint"></span>
      </div>

      <button type="submit" class="btn btn--primary btn--full btn--lg">
        Log In
      </button>

    </form>

    <p class="auth-switch">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </p>

    <p class="auth-switch" style="margin-top: 0.75rem;">
      <a href="index.html">← Back to typing test</a>
    </p>

  </div>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
