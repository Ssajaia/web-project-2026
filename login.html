<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to Wright Fasten to track your typing progress." />
  <title>Log In — Wright Fasten</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body data-page="login" class="auth-page">

  <div class="auth-card" role="main">

    <!-- Logo -->
    <div class="auth-card__logo">
      <a href="index.html" class="logo" aria-label="Wright Fasten — Home">
        <div class="logo__symbol" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="20" width="30" height="13" rx="2.5" stroke="#f0f0f0" stroke-width="1.4" fill="none"/>
            <line x1="10" y1="16" x2="26" y2="16" stroke="#f0f0f0" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="14" y1="11.5" x2="26" y2="11.5" stroke="#f0f0f0" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
            <line x1="18" y1="7" x2="26" y2="7" stroke="#f0f0f0" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
            <rect x="7"  y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="12" y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="17" y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="22" y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="10" y="28" width="16" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.3"/>
          </svg>
        </div>
        <div class="logo__wordmark">
          <span class="logo__name">Wright Fasten</span>
          <span class="logo__tagline">Speed Test</span>
        </div>
      </a>
    </div>

    <!-- Heading -->
    <h1 class="auth-card__title page-title">Welcome back</h1>
    <p class="auth-card__subtitle">Log in to track your typing progress</p>

    <!-- Form-level error -->
    <div
      id="login-error"
      class="error-message"
      role="alert"
      aria-live="polite"
    ></div>

    <!-- Login Form -->
    <form id="login-form" novalidate aria-label="Log in form">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="login-email">Email address</label>
        <input
          type="email"
          id="login-email"
          class="form-input"
          name="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
          aria-required="true"
          aria-describedby="login-email-hint"
        />
        <span id="login-email-hint" class="form-hint"></span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input
          type="password"
          id="login-password"
          class="form-input"
          name="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
          aria-required="true"
          aria-describedby="login-password-hint"
          minlength="8"
        />
        <span id="login-password-hint" class="form-hint"></span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn--primary btn--full btn--lg">
        Log In
      </button>

    </form>

    <!-- Switch to signup -->
    <p class="auth-switch">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </p>

    <!-- Back to test -->
    <p class="auth-switch" style="margin-top: 0.75rem;">
      <a href="index.html">← Back to typing test</a>
    </p>

  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
