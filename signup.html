<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a Write Faster account to track scores and compete on the leaderboard." />
  <title>Sign Up — Write Faster</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body data-page="signup" class="auth-page">

  <div class="auth-card" role="main">
    <div class="auth-card__logo">
      <a href="index.html" class="logo" aria-label="Write Faster — Home">
        <div class="logo__symbol" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="20" width="30" height="13" rx="2.5" stroke="#f0f0f0" stroke-width="1.4" fill="none"/>
            <line x1="10" y1="16" x2="26" y2="16" stroke="#f0f0f0" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="14" y1="11.5" x2="26" y2="11.5" stroke="#f0f0f0" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
            <line x1="18" y1="7" x2="26" y2="7" stroke="#f0f0f0" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
            <rect x="7"  y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="12" y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="17" y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="22" y="23.5" width="3.5" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.5"/>
            <rect x="10" y="28" width="16" height="2.5" rx="0.6" fill="#f0f0f0" opacity="0.3"/>
          </svg>
        </div>
        <div class="logo__wordmark">
          <span class="logo__name">Write Faster</span>
          <span class="logo__tagline">Speed Test</span>
        </div>
      </a>
    </div>

    <h1 class="auth-card__title page-title">Create account</h1>
    <p class="auth-card__subtitle">Free forever. Scores saved, leaderboard included.</p>

    <div id="signup-error" class="error-message" role="alert" aria-live="polite"></div>

    <form id="signup-form" novalidate aria-label="Sign up form">
      <div class="form-group">
        <label class="form-label" for="signup-username">Username</label>
        <input
          type="text"
          id="signup-username"
          class="form-input"
          name="username"
          autocomplete="username"
          placeholder="fastfingers42"
          required
          aria-required="true"
          aria-describedby="signup-username-hint"
          minlength="3"
        />
        <span id="signup-username-hint" class="form-hint">At least 3 characters</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="signup-email">Email</label>
        <input
          type="email"
          id="signup-email"
          class="form-input"
          name="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
          aria-required="true"
          aria-describedby="signup-email-hint"
        />
        <span id="signup-email-hint" class="form-hint"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <input
          type="password"
          id="signup-password"
          class="form-input"
          name="password"
          autocomplete="new-password"
          placeholder="••••••••"
          required
          aria-required="true"
          aria-describedby="signup-password-hint"
          minlength="8"
        />
        <span id="signup-password-hint" class="form-hint">At least 8 characters</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="signup-confirm">Confirm password</label>
        <input
          type="password"
          id="signup-confirm"
          class="form-input"
          name="confirm"
          autocomplete="new-password"
          placeholder="••••••••"
          required
          aria-required="true"
          aria-describedby="signup-confirm-hint"
        />
        <span id="signup-confirm-hint" class="form-hint"></span>
      </div>

      <button type="submit" class="btn btn--primary btn--full btn--lg">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    <p class="auth-switch"><a href="index.html">← Back to test</a></p>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
