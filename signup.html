<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a Wright Fasten account to track your typing speed over time." />
  <title>Sign Up </title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body data-page="signup" class="auth-page">

  <div class="auth-card" role="main">

    <!-- Logo -->
    <div class="auth-card__logo">
      <a href="index.html" class="logo" aria-label="write faster — Home">
        <div class="logo__symbol" aria-hidden="true">
         <img src="./assets/logo.svg" alt="logo">
        </div>
        <div class="logo__wordmark">
          <span class="logo__name">Wright Fasten</span>
          <span class="logo__tagline">Speed Test</span>
        </div>
      </a>
    </div>

    <h1 class="auth-card__title page-title">Create account</h1>

    <div
      id="signup-error"
      class="error-message"
      role="alert"
      aria-live="polite"
    ></div>

    <form id="signup-form" novalidate aria-label="Sign up form">

      <div class="form-group">
        <label class="form-label" for="signup-username">Username</label>
        <input
          type="text"
          id="signup-username"
          class="form-input"
          name="username"
          autocomplete="username"
          placeholder="fastfingers42"
          required
          aria-required="true"
          aria-describedby="signup-username-hint"
          minlength="3"
        />
        <span id="signup-username-hint" class="form-hint">At least 3 characters</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="signup-email">Email address</label>
        <input
          type="email"
          id="signup-email"
          class="form-input"
          name="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
          aria-required="true"
          aria-describedby="signup-email-hint"
        />
        <span id="signup-email-hint" class="form-hint"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <input
          type="password"
          id="signup-password"
          class="form-input"
          name="password"
          autocomplete="new-password"
          placeholder="••••••••"
          required
          aria-required="true"
          aria-describedby="signup-password-hint"
          minlength="8"
        />
        <span id="signup-password-hint" class="form-hint">At least 8 characters</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="signup-confirm">Confirm password</label>
        <input
          type="password"
          id="signup-confirm"
          class="form-input"
          name="confirm"
          autocomplete="new-password"
          placeholder="••••••••"
          required
          aria-required="true"
          aria-describedby="signup-confirm-hint"
        />
        <span id="signup-confirm-hint" class="form-hint"></span>
      </div>

      <button type="submit" class="btn btn--primary btn--full btn--lg">
        Create Account
      </button>

    </form>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Log in</a>
    </p>

    <p class="auth-switch" style="margin-top: 0.75rem;">
      <a href="index.html">← Back to typing test</a>
    </p>

  </div>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
