<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0e0e0e"/>

  <!-- Speed lines (top, fading) -->
  <line x1="8"  y1="7"  x2="24" y2="7"  stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="10" y1="11" x2="24" y2="11" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="7"  y1="15" x2="24" y2="15" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Keyboard body -->
  <rect x="4" y="19" width="24" height="10" rx="2" fill="none" stroke="#f0f0f0" stroke-width="1.4"/>

  <!-- Keys row -->
  <rect x="7"  y="21.5" width="3" height="2" rx="0.5" fill="#f0f0f0" opacity="0.55"/>
  <rect x="11.5" y="21.5" width="3" height="2" rx="0.5" fill="#f0f0f0" opacity="0.55"/>
  <rect x="16" y="21.5" width="3" height="2" rx="0.5" fill="#f0f0f0" opacity="0.55"/>
  <rect x="20.5" y="21.5" width="3" height="2" rx="0.5" fill="#f0f0f0" opacity="0.55"/>

  <!-- Space bar -->
  <rect x="10" y="25" width="12" height="2" rx="0.5" fill="#f0f0f0" opacity="0.28"/>
</svg>
