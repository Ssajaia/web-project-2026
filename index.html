<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Typing speed test" />
  <title>Wright Fasten</title>

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">Wright Fasten</a>

      <nav>
        <a href="index.html">Test</a>
        <a href="login.html">Log in</a>
        <a href="signup.html">Sign up</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <section class="test">

      <div class="controls">
        <button class="mode-selector__btn is-active" data-duration="15">15s</button>
        <button class="mode-selector__btn" data-duration="30">30s</button>
        <button class="mode-selector__btn" data-duration="60">60s</button>
      </div>

      <div class="stats">
        <div>
          <span id="timer-display">00:15</span>
          <small>time</small>
        </div>

        <div>
          <span id="wpm-display">—</span>
          <small>wpm</small>
        </div>

        <div>
          <span id="accuracy-display">—</span>
          <small>accuracy</small>
        </div>
      </div>

      <div class="text-box">
        <p id="typing-display-text"></p>

        <div id="result-overlay" class="result-overlay" hidden>
          <p>Test complete</p>
          <p class="result-overlay__wpm">— wpm</p>
          <button onclick="document.getElementById('restart-btn').click()">
            Try again
          </button>
        </div>
      </div>

      <input
        id="typing-input"
        type="text"
        placeholder="Start typing..."
        autocomplete="off"
      />

      <div class="actions">
        <button id="restart-btn">Restart</button>
      </div>

    </section>

  </main>

  <footer class="footer">
    <p>© 2025 Wright Fasten</p>
    <p>
      <a href="login.html">Log in</a> ·
      <a href="signup.html">Sign up</a>
    </p>
  </footer>

  <div id="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
